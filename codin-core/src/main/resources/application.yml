# Spring Boot Configuration
# application.yml
# src/main/resources/**
spring:
  application:
    name: codin-core
  profiles:
    include: jwt, aws, email, oauth
  servlet:
    multipart:
      max-request-size: 5MB
      max-file-size: 5MB
  data:
    redis: # [Redis] 설정
      host: localhost
      port: 6379
      password: 1234
    mongodb: # [MongoDB] 설정
      host: localhost
      port: 27017
      database: codin


google:
  firebase:
    project-id:
    key-path:

server:
  servlet:
    encoding:
      force-response: true
      charset: UTF-8
      enabled: true
  domain: ${SERVER_DOMAIN}
  forward-headers-strategy: framework
  port: ${SERVER_PORT}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    groups-order: DESC
    doc-expansion: list
    tags-sorter: alpha
    operationsSorter: method
    disable-swagger-default-url: true
    display-request-duration: true

schedule:
  path :
  department:
    cron:
  starinu:
    cron:

lecture:
  python:
    path:
  file:
    path:

security:
  #투표 이벤트 공개 API
  public-api:
    urls:
