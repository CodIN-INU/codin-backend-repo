<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입 인증번호</title>
    <style>
        .email-container {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #f9f9f9;
        }
        .email-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .auth-code {
            font-size: 24px;
            font-weight: bold;
            color: #2d89ef;
            margin-top: 20px;
            text-align: center;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            text-align: center;
            color: #888;
        }
    </style>
</head>
<body>
<div class="email-container">
    <div class="email-header">
        <h2>[CODIN] 회원가입 인증번호</h2>
    </div>
    <p>안녕하세요, CODIN을 이용해주셔서 감사합니다.</p>
    <p>아래의 인증번호를 입력해 회원가입 절차를 완료해 주세요:</p>
    <div class="auth-code" th:text="${authNum}"></div>
    <p>이 인증번호는 10분 동안만 유효합니다.</p>
    <div class="footer">
        <p>이메일 관련 문제가 발생하면 <a href="mailto:inu.codin@gmail.com">inu.codin@gmail.com</a>으로 문의해 주세요.</p>
    </div>
</div>
</body>
</html>
