spring:
  application:
    name: codin-lecture-api
  config:
    import: optional:file:./.env[.properties], optional:file:./.env.local[.properties]
  jwt:
    secret: ${SPRING_JWT_SECRET}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
  # MySQL Database Configuration
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${LECTURE_MYSQL_DATABASE}?useSSL=false&useUnicode=true&characterEncoding=utf8&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO}
    show-sql: true
  ai:
    model:
      chat: openai
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4.1-mini
          temperature: 0.7
  task:
    scheduling:
      pool:
        size: 2
      thread-name-prefix: scheduled-task-
    execution:
      pool:
        core-size: 2
        max-size: 4
        queue-capacity: 100

  elasticsearch:
    uris: ${ELASTICSEARCH_URL}
    indices:
      lectures:
        settings:
          analysis:
            tokenizer:
              nori_tokenizer:
                type: nori_tokenizer
                decompound_mode: mixed
            filter:
              nori_readingform:
                type: nori_readingform
              autocomplete_filter:
                type: edge_ngram
                min_gram: 1
                max_gram: 20
            analyzer:
              nori:
                type: custom
                tokenizer: nori_tokenizer
                filter: [ nori_readingform, lowercase ]
              nori_autocomplete:
                type: custom
                tokenizer: nori_tokenizer
                filter: [ nori_readingform, autocomplete_filter, lowercase ]

lecture:
  python:
    path: ${PYTHON_PATH:./example}
  file:
    path: ${PYTHON_FILE_PATH:./example}

server:
  port: ${LECTURE_SERVER_PORT}
  domain: ${LECTURE_SERVER_DOMAIN}
  forward-headers-strategy: framework
  feign:
    url: ${USER_CLIENT_URL}

logging:
  level:
    root: info
    sql: debug
    org.hibernate.sql: info