spring:
  application:
    name: codin-ticketing-api
  config:
    import: optional:file:./.env[.properties], optional:file:./.env.local[.properties]
  profiles:
    active:
      local
  jwt:
    secret: ${SPRING_JWT_SECRET}

  # MySQL Database Configuration
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${TICKETING_MYSQL_DATABASE}?useSSL=false&useUnicode=true&characterEncoding=utf8&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO}
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: ${JPA_SHOW_SQL}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        #format_sql: true
        #use_sql_comments: true
        jdbc:
          batch_size: 20
          order_inserts: true
          order_updates: true

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DATABASE}

# Redis Stream Configuration
redis:
  stream:
    stock:
      key: ${STOCK_REDIS_STREAM_KEY}

server:
  domain: ${TICKETING_SERVER_DOMAIN}
  forward-headers-strategy: framework
  port: ${TICKETING_SERVER_PORT}

# Feign Main API Server URL
user:
  client:
    url: ${USER_CLIENT_URL}

# Swagger SpringDoc Configuration
springdoc:
  override-with-generic-response: false
  api-docs:
    enabled: true
  swagger-ui:
    groups-order: DESC
    doc-expansion: list
    tags-sorter: alpha
    operationsSorter: method
    disable-swagger-default-url: true
    display-request-duration: true

# S3 Configuration
cloud:
  aws:
    s3:
      bucket: ${S3_BUCKET}
    stack.auto: false
    region.static: ${S3_REGION}
    credentials:
      access-key: ${S3_ACCESS_KEY}
      secret-key: ${S3_SECRET_KEY}

# Hibernate Log Level Configuration
logging:
  level:
    root: info
    sql: ${SQL_LOG_LEVEL:warn}
    org.hibernate.SQL: ${SQL_LOG_LEVEL:warn}
    org.hibernate.type.descriptor.sql.BasicBinder: ${SQL_LOG_LEVEL:warn}