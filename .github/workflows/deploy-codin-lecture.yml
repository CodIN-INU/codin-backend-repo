name: deploy codin-lecture on branch 'main'
on:
  push:
    branches: [ main ]
    paths:
      - 'codin-lecture-api/**'
      - 'codin-common/**'
      - 'codin-security/**'
      - 'docker/prod/docker-compose.yml'
  workflow_dispatch:

jobs:
  # Lecture API Module CI
  build-codin-lecture-api:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build API module
        run: ./gradlew :codin-lecture-api:build -x test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push API image
        uses: docker/build-push-action@v6
        with:
          context: codin-lecture-api
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/codin-lecture-api:latest

  # Lecture API Module CD
  deploy-codin-lecture:
    needs: [build-codin-lecture-api]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync docker-compose.yml to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          port: ${{ secrets.PORT }}
          source: "docker/prod/docker-compose.yml"
          target: "/opt/mono-repo"
          strip_components: 2

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          port: ${{ secrets.PORT }}
          script: |
            echo ${{ secrets.PASSWORD }} | sudo -S su -c "
              cd /opt/mono-repo
              docker compose pull codin-lecture-api
              docker compose up -d codin-lecture-api
              docker images -f 'dangling=true' -q | xargs sudo docker rmi || true
              docker ps -a
            "
