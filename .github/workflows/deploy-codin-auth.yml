name: deploy codin-auth on branch 'main'
on:
  push:
    branches: [ main ]
    paths:
      - 'codin-auth/**'
      - 'codin-common/**'
      - 'codin-security/**'
      - 'docker/prod/docker-compose.yml'
  workflow_dispatch:

jobs:
  build-codin-auth:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew :codin-auth:build -x test

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image And Push
        uses: docker/build-push-action@v6
        with:
          context: codin-auth
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/codin-auth-api:latest
          cache-from: type=registry,mode=max,ref=${{ secrets.DOCKERHUB_USERNAME }}/codin-auth-api:cache,image-manifest=true,oci-mediatypes=true
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/codin-auth-api:cache,image-manifest=true,oci-mediatypes=true

  deploy-codin-auth:
    needs: [build-codin-auth]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync docker-compose.yml to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          port: ${{ secrets.PORT }}
          source: "docker/prod/docker-compose.yml"
          target: "/opt/mono-repo"
          strip_components: 2

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          port: ${{ secrets.PORT }}
          script: |
            echo ${{ secrets.PASSWORD }} | sudo -S su -c "
              cd /opt/mono-repo
              docker compose pull codin-auth-api
              docker compose up -d codin-auth-api
              docker images -f 'dangling=true' -q | xargs sudo docker rmi || true
              docker ps -a
            "
