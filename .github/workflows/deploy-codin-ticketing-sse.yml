name: deploy codin-ticketing-sse on branch 'main'
on:
  push:
    branches: [ main ]
    paths:
      - 'codin-ticketing-sse/**'
      - 'codin-common/**'
      - 'codin-security/**'
      - 'docker/prod/docker-compose.yml'
  workflow_dispatch:

jobs:
  build-codin-ticketing-sse:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build SSE module
        run: ./gradlew :codin-ticketing-sse:build -x test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push SSE image
        uses: docker/build-push-action@v6
        with:
          context: codin-ticketing-sse
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/codin-ticketing-sse:latest

  deploy-codin-ticketing-sse:
    needs: [build-codin-ticketing-sse]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.10
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          port: ${{ secrets.PORT }}
          source: "docker/prod/docker-compose.yml"
          target: "/opt/mono-repo"
          strip_components: 2

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          port: ${{ secrets.PORT }}
          script: |
            echo ${{ secrets.PASSWORD }} | sudo -S su -c "
              cd /opt/mono-repo
              docker compose pull codin-ticketing-sse
              docker compose up -d codin-ticketing-sse
              docker images -f 'dangling=true' -q | xargs sudo docker rmi || true
              docker ps -a
            "
